services:
  nginx:
    image: nginx:latest
    container_name: nginx
    restart: unless-stopped
    ports:
      - ${PORT_HTTP:-80}:80
      - ${PORT_HTTPS:-443}:443
    volumes:
      - "${CONF_DIR:-./config.d}:/etc/nginx/conf.d"
      - "${CERT_DIR:-./certs}:/etc/nginx/certs:ro"
      - "${PROJECT_DIR:-/home/ben/projects}:/var/www"
    healthcheck:
      test: ["CMD-SHELL", "nginx -t && curl -sf http://localhost/nginx-health || curl -sf http://localhost || exit 0"]
      interval: 30s
      timeout: 10s
      retries: 3
      start_period: 10s
    networks:
      - ben

networks:
  ben:
    external: true
