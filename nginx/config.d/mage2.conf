server {
  listen 443 ssl;
  server_name mage2.local;
  ssl_certificate     /etc/nginx/certs/_wildcard.local+1.pem;
  ssl_certificate_key /etc/nginx/certs/_wildcard.local+1-key.pem;
  set $MAGE_ROOT /var/www/mage2/html;
  include /var/www/mage2/html/nginx.conf;
}

server {
  listen 80;
  server_name mage2.benthunder.io.vn;
  set $MAGE_ROOT /var/www/mage2/html;
  include /var/www/mage2/html/nginx.conf;
}
