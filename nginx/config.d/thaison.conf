server {
    listen 80;
    server_name thaison.com www.thaison.com;
    root /var/www/html/wordpress;
    index index.php index.html index.htm;

    # Logging
    access_log /var/log/nginx/thaison.com.access.log;
    error_log /var/log/nginx/thaison.com.error.log;

    # Standard WordPress routing for permalinks
    location / {
        try_files $uri $uri/ /index.php?$args;
    }

    # Pass PHP scripts to FastCGI server (PHP-FPM)
    location ~ \\.php$ {
        include snippets/fastcgi-php.conf;
        # You may need to change the socket path depending on your PHP version and OS
        fastcgi_pass php84-fpm:9000;
        fastcgi_param SCRIPT_FILENAME $document_root$fastcgi_script_name;
        include fastcgi_params;
    }

    # Deny access to .htaccess files and other hidden files (Apache specific)
    location ~ /\\.ht {
        deny all;
    }

    # Serve static files with a far future expiration date for browser caching
    location ~* \\.(js|css|png|jpg|jpeg|gif|ico|svg|woff|woff2|ttf|eot|webp|avif)$ {
        expires max;
        log_not_found off;
    }

    # Optional: Set client body size limit for large uploads
    client_max_body_size 500M;
}