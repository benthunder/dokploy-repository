server {
  listen 443 ssl;
  server_name mage-self.local;
  root /var/www/mageself/public;
  index index.php;

  ssl_certificate     /etc/nginx/certs/_wildcard.local+1.pem;
  ssl_certificate_key /etc/nginx/certs/_wildcard.local+1-key.pem;

  add_header X-Frame-Options "SAMEORIGIN";
  add_header X-Content-Type-Options "nosniff";

  # 🔹 Handle main routing (VERY IMPORTANT)
  location / {
      try_files $uri $uri/ /index.php?$query_string;
  }

  # 🔹 PHP handling
  location ~ \.php$ {
      include fastcgi_params;

      fastcgi_param SCRIPT_FILENAME $realpath_root$fastcgi_script_name;
      fastcgi_param DOCUMENT_ROOT $realpath_root;

      fastcgi_pass php84-fpm:9000;

      fastcgi_index index.php;
  }

  # 🔹 Deny access to hidden files
  location ~ /\. {
      deny all;
  }

  # 🔹 Static files (performance)
  location ~* \.(js|css|png|jpg|jpeg|gif|ico|svg)$ {
      try_files $uri =404;
      expires max;
      log_not_found off;
  }

  # 🔹 Prevent direct access to sensitive files
  location ~* /(app|vendor|composer\.(json|lock)) {
      deny all;
  }

  location ~ /\.(?!well-known).* {
      deny all;
  }
}
