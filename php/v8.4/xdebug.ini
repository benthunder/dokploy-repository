zend_extension=xdebug

; Default: off — zero overhead unless XDEBUG_MODE is set.
; Override at runtime via env var (no file editing needed):
;   XDEBUG_MODE=debug        step-debugging in IDE
;   XDEBUG_MODE=develop      enhanced error display + var_dump
;   XDEBUG_MODE=profile      profiler (output in xdebug-output/profiles/)
;   XDEBUG_MODE=trace        function tracer (output in xdebug-output/traces/)
;   XDEBUG_MODE=debug,develop  combine modes
xdebug.mode = off

xdebug.start_with_request = trigger
xdebug.discover_client_host = true
xdebug.use_compression = false
xdebug.log = /tmp/xdebug.log

xdebug.output_dir = /xdebug
xdebug.profiler_output_name = profiles/cachegrind.%H.%R.%r
xdebug.trace_output_name = traces/default-fpm.%H.%R.%r
xdebug.trace_format = 0
xdebug.trace_options = 0x08
xdebug.collect_params = 1
xdebug.collect_return = 1
