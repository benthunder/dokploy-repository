services:
  php84-fpm:
    build:
      context: .
      dockerfile: ./DockerFile
      args:
        NODE_VERSION: 20
        PHP_VERSION: 8.4
        UID: 1000
        GID: 1000
    container_name: php84-fpm
    restart: always
    environment:
      XDEBUG_MODE: ${XDEBUG_MODE:-off}
    volumes:
      - "${PROJECT_DIR:-/home/ben/projects}:/var/www"
      - ./xdebug.ini:/usr/local/etc/php/conf.d/docker-php-ext-xdebug.ini:ro
      - "${XDEBUG_OUTPUT_DIR:-./xdebug-output}:/xdebug"
    healthcheck:
      test: ["CMD-SHELL", "php-fpm -t || exit 1"]
      interval: 30s
      timeout: 10s
      retries: 3
      start_period: 30s
    networks:
      - ben

networks:
  ben:
    external: true
