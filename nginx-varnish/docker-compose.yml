services:
  nginx:
    image: nginx:latest
    container_name: nginx-backend
    restart: unless-stopped
    ports:
      - "${NGINX_PORT:-8080}:80"
    volumes:
      - "${CONF_DIR:-./nginx/conf.d}:/etc/nginx/conf.d"
      - "${CERT_DIR:-./nginx/certs}:/etc/nginx/certs:ro"
      - "${PROJECT_DIR:-/var/www}:/var/www"
    healthcheck:
      test: ["CMD-SHELL", "nginx -t && curl -sf http://localhost/nginx-health || curl -sf http://localhost || exit 0"]
      interval: 30s
      timeout: 10s
      retries: 3
      start_period: 10s
    networks:
      - web-tier

  varnish:
    image: varnish:7.4
    container_name: varnish-cache
    restart: unless-stopped
    ports:
      - "${VARNISH_PORT:-80}:80"
      - "${VARNISH_ADMIN_PORT:-6082}:6082"
    volumes:
      - "${VARNISH_VCL:-./varnish/default.vcl}:/etc/varnish/default.vcl:ro"
    environment:
      - VARNISH_SIZE=${VARNISH_SIZE:-256M}
    command:
      - "-p"
      - "default_ttl=3600"
      - "-p"
      - "default_grace=3600"
    depends_on:
      nginx:
        condition: service_healthy
    healthcheck:
      test: ["CMD-SHELL", "varnishadm ping || exit 1"]
      interval: 30s
      timeout: 10s
      retries: 3
      start_period: 15s
    networks:
      - web-tier

networks:
  web-tier:
    driver: bridge
