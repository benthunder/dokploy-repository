version: '3.8'

# ============================================
# HOMELAB STACK: Varnish + Nginx + Multi PHP
# ============================================
# Architecture:
#   Internet → Varnish:80 → Nginx:8080/8443 → PHP-FPM (7.2-8.4)
# ============================================

networks:
  homelab:
    driver: bridge
    ipam:
      config:
        - subnet: 172.20.0.0/16

volumes:
  # Persistent volumes
  projects:
    driver: local
  nginx-logs:
    driver: local
  varnish-cache:
    driver: local
  php-logs:
    driver: local

services:
  # ==========================================
  # VARNISH CACHE (Port 80)
  # ==========================================
  varnish:
    build:
      context: ./varnish
      dockerfile: Dockerfile
    container_name: homelab-varnish
    restart: unless-stopped
    ports:
      - "80:80"
      - "6081:6081"  # Varnish admin
    environment:
      - VARNISH_SIZE=256M
      - VARNISH_BACKEND_HOST=nginx
      - VARNISH_BACKEND_PORT=8080
    volumes:
      - ./configs/varnish/default.vcl:/etc/varnish/default.vcl:ro
      - varnish-cache:/var/lib/varnish
    depends_on:
      nginx:
        condition: service_healthy
    healthcheck:
      test: ["CMD", "varnishstat", "-1"]
      interval: 10s
      timeout: 5s
      retries: 3
      start_period: 10s
    networks:
      homelab:
        ipv4_address: 172.20.0.10

  # ==========================================
  # NGINX WEB SERVER (Port 8080/8443)
  # ==========================================
  nginx:
    build:
      context: ./nginx
      dockerfile: Dockerfile
    container_name: homelab-nginx
    restart: unless-stopped
    ports:
      - "8080:8080"
      - "8443:8443"
    volumes:
      - "${PROJECT_DIR:-./projects}:/var/www:rw"
      - ./configs/nginx/nginx.conf:/etc/nginx/nginx.conf:ro
      - ./configs/nginx/conf.d:/etc/nginx/conf.d:ro
      - ./configs/nginx/ssl:/etc/nginx/ssl:ro
      - nginx-logs:/var/log/nginx
    depends_on:
      php72:
        condition: service_healthy
      php74:
        condition: service_healthy
      php80:
        condition: service_healthy
      php81:
        condition: service_healthy
      php82:
        condition: service_healthy
      php83:
        condition: service_healthy
      php84:
        condition: service_healthy
    healthcheck:
      test: ["CMD", "nginx", "-t"]
      interval: 10s
      timeout: 5s
      retries: 3
      start_period: 10s
    networks:
      homelab:
        ipv4_address: 172.20.0.20

  # ==========================================
  # PHP-FPM 7.2
  # ==========================================
  php72:
    build:
      context: ./php/7.2
      dockerfile: Dockerfile
      args:
        PHP_VERSION: "7.2"
        UID: ${UID:-1000}
        GID: ${GID:-1000}
    container_name: homelab-php72
    restart: unless-stopped
    environment:
      - PHP_VERSION=7.2
      - XDEBUG_MODE=${XDEBUG_MODE:-off}
      - XDEBUG_CONFIG=${XDEBUG_CONFIG:-}
    volumes:
      - "${PROJECT_DIR:-./projects}:/var/www:rw"
      - ./configs/php/7.2/php.ini:/usr/local/etc/php/php.ini:ro
      - ./configs/php/7.2/php-fpm.conf:/usr/local/etc/php-fpm.d/www.conf:ro
      - ./configs/php/7.2/xdebug.ini:/usr/local/etc/php/conf.d/docker-php-ext-xdebug.ini:ro
      - php-logs:/var/log/php
    healthcheck:
      test: ["CMD-SHELL", "php-fpm -t || exit 1"]
      interval: 30s
      timeout: 10s
      retries: 3
      start_period: 30s
    networks:
      homelab:
        ipv4_address: 172.20.0.72

