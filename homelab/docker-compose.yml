  # ==========================================
  # PHP-FPM 7.4
  # ==========================================
  php74:
    build:
      context: ./php/7.4
      dockerfile: Dockerfile
      args:
        PHP_VERSION: "7.4"
        UID: ${UID:-1000}
        GID: ${GID:-1000}
    container_name: homelab-php74
    restart: unless-stopped
    environment:
      - PHP_VERSION=7.4
      - XDEBUG_MODE=${XDEBUG_MODE:-off}
      - XDEBUG_CONFIG=${XDEBUG_CONFIG:-}
    volumes:
      - "${PROJECT_DIR:-./projects}:/var/www:rw"
      - ./configs/php/7.4/php.ini:/usr/local/etc/php/php.ini:ro
      - ./configs/php/7.4/php-fpm.conf:/usr/local/etc/php-fpm.d/www.conf:ro
      - ./configs/php/7.4/xdebug.ini:/usr/local/etc/php/conf.d/docker-php-ext-xdebug.ini:ro
      - php-logs:/var/log/php
    healthcheck:
      test: ["CMD-SHELL", "php-fpm -t || exit 1"]
      interval: 30s
      timeout: 10s
      retries: 3
      start_period: 30s
    networks:
      - homelab-network

